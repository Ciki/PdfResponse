name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        deps: ['highest']
        include:
          - php: '8.3'
            deps: 'lowest'

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml, mbstring, gd, intl, iconv
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.deps }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.deps }}-

      - name: Install dependencies (highest)
        if: matrix.deps == 'highest'
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Install dependencies (lowest)
        if: matrix.deps == 'lowest'
        run: composer update --no-interaction --no-progress --prefer-dist --prefer-lowest

      - name: PHPStan
        run: composer phpstan

      - name: ECS
        run: composer ecs

      - name: Rector (dry-run)
        run: composer rector

      - name: Tester
        run: composer tester
